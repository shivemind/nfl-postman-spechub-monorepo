type: http
name: Get the most recent league-formatted injury report for a club
url: '{{baseUrl}}/clubs/:clubId/injury-reports/latest'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: clubId
    value: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "clubId": "string",
            "reportDate": "1948-12-20",
            "entries": [
              {
                "playerId": "string",
                "bodyPart": "string",
                "participation": "limited",
                "status": "out"
              },
              {
                "playerId": "string",
                "bodyPart": "string",
                "participation": "limited",
                "status": "doubtful"
              }
            ],
            "submittedBy": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Latest injury report

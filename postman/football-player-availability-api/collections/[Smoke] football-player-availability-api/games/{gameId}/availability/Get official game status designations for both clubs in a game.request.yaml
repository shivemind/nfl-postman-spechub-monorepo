type: http
name: Get official game status designations for both clubs in a game
url: '{{baseUrl}}/games/:gameId/availability'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: gameId
    value: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "gameId": "string",
            "designations": [
              {
                "playerId": "string",
                "designationType": "game",
                "status": "none",
                "reason": "string",
                "updatedAt": "1970-04-22T11:07:59.141Z"
              },
              {
                "playerId": "string",
                "designationType": "practice",
                "status": "none",
                "reason": "string",
                "updatedAt": "2001-02-01T16:54:27.412Z"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Game availability report

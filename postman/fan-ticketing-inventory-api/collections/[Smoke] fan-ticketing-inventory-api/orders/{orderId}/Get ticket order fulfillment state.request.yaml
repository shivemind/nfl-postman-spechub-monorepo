type: http
name: Get ticket order fulfillment state
url: '{{baseUrl}}/orders/:orderId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "orderId": "string",
            "eventId": "string",
            "purchaserType": "club",
            "status": "paid",
            "deliveryMethod": "partner-allocation"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Ticket order
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 6407
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found

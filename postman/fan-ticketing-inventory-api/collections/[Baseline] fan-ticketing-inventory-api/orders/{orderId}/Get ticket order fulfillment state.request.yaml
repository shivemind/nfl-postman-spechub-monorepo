type: http
name: Get ticket order fulfillment state
url: '{{baseUrl}}/orders/:orderId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: orderId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "orderId": "string",
            "eventId": "string",
            "purchaserType": "club",
            "status": "cancelled",
            "deliveryMethod": "will-call"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Ticket order
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 5819
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found

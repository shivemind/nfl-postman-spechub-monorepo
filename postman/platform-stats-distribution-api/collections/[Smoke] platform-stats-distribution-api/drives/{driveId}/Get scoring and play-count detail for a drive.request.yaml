type: http
name: Get scoring and play-count detail for a drive
url: '{{baseUrl}}/drives/:driveId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: driveId
    value: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "driveId": "string",
            "gameId": "string",
            "offenseClubId": "string",
            "playCount": 5729,
            "yards": 9136,
            "result": "punt"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Drive detail
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 1619
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Resource not found

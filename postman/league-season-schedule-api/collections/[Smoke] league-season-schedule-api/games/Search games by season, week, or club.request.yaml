type: http
name: Search games by season, week, or club
url: '{{baseUrl}}/games?season=8437&week=7&clubId=string'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: season
    value: '8437'
  - key: week
    value: '7'
  - key: clubId
    value: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "data": [
              {
                "gameId": "string",
                "season": 6389,
                "week": 1182,
                "kickoffAt": "1985-02-22T02:23:19.731Z",
                "homeClubId": "string",
                "awayClubId": "string",
                "status": "draft",
                "venueCode": "string"
              },
              {
                "gameId": "string",
                "season": 2897,
                "week": 3286,
                "kickoffAt": "1989-05-05T16:57:04.560Z",
                "homeClubId": "string",
                "awayClubId": "string",
                "status": "scheduled",
                "venueCode": "string"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Matching games

type: http
name: Record an operational incident or escalation for a game
url: '{{baseUrl}}/games/:gameId/incident-logs'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: gameId
    value: string
body:
  type: json
  content: |-
    {
      "category": "weather",
      "severity": "critical",
      "summary": "string",
      "reportedBy": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "category": "field",
            "severity": "critical",
            "summary": "string",
            "reportedBy": "string",
            "incidentId": "string",
            "openedAt": "1977-02-26T08:55:07.997Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Incident created

type: http
name: Update milestone timestamps or status for a game
url: '{{baseUrl}}/games/:gameId/run-of-show'
method: PATCH
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: gameId
    value: string
body:
  type: json
  content: |-
    {
      "milestones": [
        {
          "code": "string",
          "label": "string",
          "status": "complete",
          "scheduledAt": "1979-09-25T11:52:20.405Z",
          "actualAt": "2001-09-01T11:08:32.056Z"
        },
        {
          "code": "string",
          "label": "string",
          "status": "in-progress",
          "scheduledAt": "1974-11-22T23:06:29.179Z",
          "actualAt": "1971-01-24T07:11:27.233Z"
        }
      ]
    }
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "gameId": "string",
            "milestones": [
              {
                "code": "string",
                "label": "string",
                "status": "delayed",
                "scheduledAt": "1999-09-09T01:41:01.298Z",
                "actualAt": "1952-04-26T16:45:29.055Z"
              },
              {
                "code": "string",
                "label": "string",
                "status": "complete",
                "scheduledAt": "1962-03-10T16:28:26.437Z",
                "actualAt": "1960-01-15T01:51:52.015Z"
              }
            ],
            "operationsLead": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Run of show updated

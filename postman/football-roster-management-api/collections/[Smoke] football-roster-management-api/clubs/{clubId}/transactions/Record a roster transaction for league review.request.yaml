type: http
name: Record a roster transaction for league review
url: '{{baseUrl}}/clubs/:clubId/transactions'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: clubId
    value: string
body:
  type: json
  content: |-
    {
      "playerId": "string",
      "transactionType": "release",
      "effectiveDate": "1976-07-03",
      "notes": "string"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "playerId": "string",
            "transactionType": "waive",
            "effectiveDate": "1960-04-26",
            "notes": "string",
            "transactionId": "string",
            "approvalStatus": "rejected"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Transaction created
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "error": "string",
            "message": "string",
            "statusCode": 6959
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid request payload

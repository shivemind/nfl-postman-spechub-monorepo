$schema: https://schema.postman.com/json/draft-2020-12/collection/v3.0.0/
type: collection
name: '[Baseline] football-roster-management-api'
description: Fictional internal API for club rosters, transactions, and player profile lookups.
id: ee1cf636-4b68-4f7b-b52a-30233be9cca8
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{bearerToken}}'
      type: string
variables:
  - key: baseUrl
    value: https://stage-api.nfl.example.com/rosters
    type: any
items:
  - ref: ./clubs/folder.yaml
  - ref: ./players/folder.yaml

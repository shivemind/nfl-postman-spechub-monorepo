type: http
name: List officiating crews available for a given week
url: '{{baseUrl}}/weeks/:week/crews?season=3538'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: season
    value: '3538'
pathVariables:
  - key: week
    value: '12'
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "data": [
              {
                "crewId": "string",
                "refereeName": "string",
                "homeRegion": "string",
                "travelStatus": "unavailable"
              },
              {
                "crewId": "string",
                "refereeName": "string",
                "homeRegion": "string",
                "travelStatus": "standby"
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Weekly crew list

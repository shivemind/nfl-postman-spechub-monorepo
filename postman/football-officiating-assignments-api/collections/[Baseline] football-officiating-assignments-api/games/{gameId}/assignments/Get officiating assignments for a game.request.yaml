type: http
name: Get officiating assignments for a game
url: '{{baseUrl}}/games/:gameId/assignments'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: gameId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "gameId": "string",
            "assignments": [
              {
                "officialId": "string",
                "fullName": "string",
                "position": "side-judge",
                "alternate": true
              },
              {
                "officialId": "string",
                "fullName": "string",
                "position": "down-judge",
                "alternate": true
              }
            ]
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Game assignments

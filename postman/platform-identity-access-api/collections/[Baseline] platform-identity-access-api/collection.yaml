$schema: https://schema.postman.com/json/draft-2020-12/collection/v3.0.0/
type: collection
name: '[Baseline] platform-identity-access-api'
description: Fictional internal API for workforce identities, group membership, and service account provisioning.
id: 2d6645b3-a15b-49cb-aed2-9708f2478006
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{bearerToken}}'
      type: string
variables:
  - key: baseUrl
    value: https://stage-api.nfl.example.com/iam
    type: any
items:
  - ref: ./identities/folder.yaml
  - ref: ./groups/folder.yaml
  - ref: ./service-accounts/folder.yaml

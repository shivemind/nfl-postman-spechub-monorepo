type: http
name: Provision a service account for an internal platform or integration
url: '{{baseUrl}}/service-accounts'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "string",
      "ownerTeam": "string",
      "scopes": [
        "string",
        "string"
      ],
      "expiresAt": "2021-01-23T03:00:23.893Z"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "name": "string",
            "ownerTeam": "string",
            "scopes": [
              "string",
              "string"
            ],
            "expiresAt": "2019-07-15T22:50:19.590Z",
            "clientId": "string",
            "status": "revoked"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service account provisioned

type: http
name: Provision a service account for an internal platform or integration
url: '{{baseUrl}}/service-accounts'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "string",
      "ownerTeam": "string",
      "scopes": [
        "string",
        "string"
      ],
      "expiresAt": "1957-07-23T10:49:28.235Z"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "name": "string",
            "ownerTeam": "string",
            "scopes": [
              "string",
              "string"
            ],
            "expiresAt": "1962-10-09T02:45:49.492Z",
            "clientId": "string",
            "status": "active"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service account provisioned
